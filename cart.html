#cart {
    background: #fff;
    padding: 20px;
    margin-top: 30px;
    border-radius: 10px;
}

#cart ul {
    list-style: none;
    padding: 0;
}

#cart li {
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
}

#cart button {
    background: red;
    color: #fff;
    border: none;
    cursor: pointer;
    padding: 5px 10px;
}
