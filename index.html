<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everthread Clothing</title>

    <!-- LINK TO EXTERNAL CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Everthread</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Cart</a>
    </nav>
</header>

<div class="container">

    <!-- HERO BANNER -->
    <div class="hero">
        <img src="images/hero.jpg" alt="Hero Banner">

        <div class="hero-content">
            <h1>Hero Banner</h1>
            <button>Shop Now</button>
        </div>
    </div>

    <!-- BRAND VIDEO -->
    <div class="video-section">
        <h2>Our Brand Story</h2>

        <video controls>
            <source src="videos/brand.mp4" type="video/mp4">
        </video>
    </div>

    <!-- FEATURED PRODUCTS -->
    <h2 class="section-title">Featured Products</h2>
    <div class="grid">

        <div class="card">
            <img src="images/product1.jpg" alt="Product">
            <p>Product Name</p>
        </div>

        <div class="card">
            <img src="images/product2.jpg" alt="Product">
            <p>Product Name</p>
        </div>

        <div class="card">
            <img src="images/product3.jpg" alt="Product">
            <p>Product Name</p>
        </div>

        <div class="card">
            <img src="images/product4.jpg" alt="Product">
            <p>Product Name</p>
        </div>

    </div>

    <!-- CATEGORIES -->
    <h2 class="section-title">Categories</h2>
    <div class="grid">

        <div class="card">
            <img src="images/category1.jpg" alt="Category">
            <p>T-Shirts</p>
        </div>

        <div class="card">
            <img src="images/category2.jpg" alt="Category">
            <p>Hoodies</p>
        </div>

        <div class="card">
            <img src="images/category3.jpg" alt="Category">
            <p>Jeans</p>
        </div>

        <div class="card">
            <img src="images/category4.jpg" alt="Category">
            <p>Accessories</p>
        </div>

    </div>

</div>

<footer>
    <p>&copy; 2026 Everthread Clothing</p>
</footer>

</body>
</html>
